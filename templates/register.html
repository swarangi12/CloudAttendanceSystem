<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>

    <style>

        body{
            font-family:Arial;
            background:#f2f2f2;
        }

        .container{
            width:400px;
            margin:50px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:10px;
            background:blue;
            color:white;
            border:none;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="container">

<h2>Student Registration</h2>

<form action="/register" method="POST">

<input
type="text"
name="roll"
placeholder="Roll Number"
required>

<input
type="text"
name="name"
placeholder="Student Name"
required>

<input
type="text"
name="department"
placeholder="Department"
required>

<input
type="number"
name="semester"
placeholder="Semester"
required>

<input
type="email"
name="email"
placeholder="Email"
required>

<button type="submit">

Register Student

</button>

</form>

</div>

</body>

</html>
