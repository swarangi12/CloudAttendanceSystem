<!DOCTYPE html>

<html>

<head>

<title>Attendance Report</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:30px;
}

table{
width:90%;
margin:auto;
border-collapse:collapse;
background:white;
}

th,td{

padding:12px;

border:1px solid #ddd;

text-align:center;

}

th{

background:#2c3e50;

color:white;

}

h2{

text-align:center;

}

.button{

text-align:center;

margin-top:20px;

}

.button a{

padding:10px 20px;

background:#3498db;

color:white;

text-decoration:none;

border-radius:5px;

}

</style>

</head>

<body>

<h2>Attendance Report</h2>

<table>

<tr>

<th>Date</th>

<th>Roll No</th>

<th>Name</th>

<th>Status</th>

</tr>

{% for row in records %}

<tr>

<td>{{row[0]}}</td>

<td>{{row[1]}}</td>

<td>{{row[2]}}</td>

<td>{{row[3]}}</td>

</tr>

{% endfor %}

</table>
<br><br>

<div style="text-align:center;">

<a href="/export_excel"
style="
background:green;
color:white;
padding:12px 20px;
text-decoration:none;
border-radius:6px;">

📥 Download Excel Report

</a>

</div>

<div class="button">

<a href="/dashboard">

Back to Dashboard

</a>

</div>

</body>

</html>
