<!DOCTYPE html>
<html>
<head>
    <title>Students</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            margin:0;
            padding:30px;
        }

        h1{
            text-align:center;
            color:#333;
        }

        .container{
            width:90%;
            margin:auto;
        }

        .top-buttons{
            margin-bottom:20px;
        }

        .btn{
            padding:10px 18px;
            text-decoration:none;
            color:white;
            border-radius:5px;
            margin-right:10px;
        }

        .add{
            background:#28a745;
        }

        .home{
            background:#007bff;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th,td{
            padding:12px;
            text-align:center;
            border:1px solid #ddd;
        }

        th{
            background:#007bff;
            color:white;
        }

        tr:nth-child(even){
            background:#f2f2f2;
        }

        .capture{
            background:#17a2b8;
            color:white;
            padding:8px 12px;
            text-decoration:none;
            border-radius:5px;
        }

        .edit{
            background:orange;
            color:white;
            padding:8px 12px;
            text-decoration:none;
            border-radius:5px;
        }

        .delete{
            background:red;
            color:white;
            padding:8px 12px;
            text-decoration:none;
            border-radius:5px;
        }

    </style>

</head>

<body>

<div class="container">

<h1>Registered Students</h1>

<div class="top-buttons">

<a href="/" class="btn home">🏠 Home</a>

<a href="/register" class="btn add">➕ Add Student</a>

</div>

<table>

<tr>

<th>Roll No</th>

<th>Name</th>

<th>Department</th>

<th>Year</th>

<th>Capture Face</th>

<th>Edit</th>

<th>Delete</th>

</tr>

{% for student in students %}

<tr>

<td>{{ student[0] }}</td>

<td>{{ student[1] }}</td>

<td>{{ student[2] }}</td>

<td>{{ student[3] }}</td>

<td>
<a href="/capture/{{ student[0] }}" class="capture">
📷 Capture
</a>
</td>

<td>
<a href="/edit/{{ student[0] }}" class="edit">
✏ Edit
</a>
</td>

<td>
<a href="/delete/{{ student[0] }}" class="delete"
onclick="return confirm('Delete this student?')">
🗑 Delete
</a>
</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
