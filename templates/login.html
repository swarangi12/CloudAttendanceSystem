<!DOCTYPE html>
<html>
<head>

<title>Admin Login</title>

<style>

body{

font-family:Arial;

background:#3498db;

}

.login{

width:350px;

margin:100px auto;

background:white;

padding:30px;

border-radius:10px;

}

input{

width:100%;

padding:10px;

margin:10px 0;

}

button{

width:100%;

padding:10px;

background:#2ecc71;

color:white;

border:none;

cursor:pointer;

}

.error{

color:red;

}

</style>

</head>

<body>

<div class="login">

<h2 align="center">

Admin Login

</h2>

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button>

Login

</button>

</form>

{% if error %}

<p class="error">

{{error}}

</p>

{% endif %}

</div>

</body>

</html>
